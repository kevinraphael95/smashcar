<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smash or Pass — Cars Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e63946;--green:#2a9d5c;--gold:#f4a300;
  --bg:#080810;--card:#0f0f1a;--border:#1e1e35;
  --text:#f0f0ff;--muted:#6b6b90;
  --card-w:340px;--card-h:500px;
}
html,body{width:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:20px 12px 40px}

.header{text-align:center;margin-bottom:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;background:linear-gradient(135deg,#fff 40%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.tagline{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px 16px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.tab.active{background:rgba(255,255,255,.08);color:var(--text)}
.tab .badge{display:inline-block;background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:5px}

.view{display:none}.view.active{display:flex;flex-direction:column;align-items:center;width:100%}

.scorebar{display:flex;gap:24px;margin-bottom:18px;align-items:center}
.score-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px}
.score-dot{width:8px;height:8px;border-radius:50%}
.score-dot.pass{background:var(--red)}
.score-dot.smash{background:var(--green)}
.score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;min-width:20px;text-align:right}
.score-num.pass{color:var(--red)}
.score-num.smash{color:var(--green)}

.deck{position:relative;width:var(--card-w);height:var(--card-h);margin-bottom:22px;touch-action:none}
.card{
  position:absolute;inset:0;border-radius:24px;overflow:hidden;
  background:var(--card);border:1px solid var(--border);
  will-change:transform;transform-origin:50% 100%;
}
.card.front{z-index:3;cursor:grab}
.card.front:active{cursor:grabbing}
.card.mid{z-index:2;transform:scale(.95) translateY(-10px);filter:brightness(.7)}
.card.back{z-index:1;transform:scale(.90) translateY(-20px);filter:brightness(.45)}
.card.ghost{z-index:0;transform:scale(.85) translateY(-28px);filter:brightness(.2)}

.car-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .5s;opacity:0}
.car-img.visible{opacity:1}
.skel{position:absolute;inset:0;background:linear-gradient(110deg,#0f0f1a 30%,#1a1a2e 50%,#0f0f1a 70%);background-size:400% 100%;animation:skel 1.5s ease infinite}
@keyframes skel{0%{background-position:100% 0}100%{background-position:-100% 0}}
.card-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,12,.98) 0%,rgba(4,4,12,.6) 40%,rgba(4,4,12,.1) 70%,transparent 100%);pointer-events:none}
.card-top-grad{position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,rgba(4,4,12,.5),transparent);pointer-events:none;display:flex;align-items:flex-start;justify-content:space-between;padding:16px}
.car-num{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px}
.origin-flag{font-size:22px}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:20px}
.car-category{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.car-make{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:2px;font-weight:300}
.car-model{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;color:#fff;margin-bottom:8px}
.car-year{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,.35);margin-left:6px;vertical-align:middle}
.car-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 6px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:17px;color:#fff;line-height:1}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.car-desc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5;margin-bottom:4px}

.vind{position:absolute;top:20px;padding:7px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;opacity:0;pointer-events:none;border:2.5px solid;transition:opacity .1s}
.vind.smash{left:16px;color:var(--green);border-color:var(--green);text-shadow:0 0 20px rgba(42,157,92,.5)}
.vind.pass{right:16px;color:var(--red);border-color:var(--red);text-shadow:0 0 20px rgba(230,57,70,.5)}

.actions{display:flex;gap:12px;align-items:center;width:var(--card-w)}
.btn{height:56px;border:none;border-radius:16px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;transition:transform .15s,background .2s;flex:1}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-pass{background:rgba(230,57,70,.12);color:var(--red);border:1.5px solid rgba(230,57,70,.3)}
.btn-pass:hover:not(:disabled){background:rgba(230,57,70,.2)}
.btn-smash{background:rgba(42,157,92,.12);color:var(--green);border:1.5px solid rgba(42,157,92,.3)}
.btn-smash:hover:not(:disabled){background:rgba(42,157,92,.2)}
.btn-info{width:52px;height:56px;flex:none;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.btn-info:hover{background:rgba(255,255,255,.08);color:var(--text)}

.hint{font-size:11px;color:var(--muted);text-align:center;margin-top:12px;letter-spacing:.5px;opacity:.6}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111120;border:1px solid #2a2a45;color:#fff;padding:10px 22px;border-radius:12px;font-weight:500;font-size:14px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

.fly-left{animation:flyL .45s cubic-bezier(.55,.055,.675,.19) forwards!important}
.fly-right{animation:flyR .45s cubic-bezier(.55,.055,.675,.19) forwards!important}
@keyframes flyL{to{transform:translateX(-150%) rotate(-30deg);opacity:0}}
@keyframes flyR{to{transform:translateX(150%) rotate(30deg);opacity:0}}
.card-enter{animation:cardIn .4s cubic-bezier(.34,1.2,.64,1) forwards}
@keyframes cardIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:none;opacity:1}}

.garage-header{width:100%;max-width:700px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
.garage-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
.garage-count{font-size:13px;color:var(--muted)}
.garage-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.garage-empty .icon{font-size:48px;margin-bottom:12px}
.garage-empty p{font-size:14px;line-height:1.7}
.garage-grid{width:100%;max-width:700px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.garage-card{border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--border);position:relative;aspect-ratio:3/4;cursor:pointer;transition:transform .2s,border-color .2s}
.garage-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15)}
.garage-card img{width:100%;height:100%;object-fit:cover;display:block}
.garage-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.g-make{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.g-model{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;line-height:1.1}
.g-year{font-size:9px;color:var(--gold)}
.garage-card .smash-badge{position:absolute;top:8px;right:8px;background:rgba(42,157,92,.9);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-backdrop.hidden{display:none}
.modal{background:#0d0d1f;border:1px solid #2a2a45;border-radius:20px;width:100%;max-width:400px;overflow:hidden}
.modal-img{width:100%;height:220px;object-fit:cover}
.modal-body{padding:20px}
.modal-make{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;margin:2px 0 12px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.modal-stat{background:rgba(255,255,255,.05);border-radius:10px;padding:10px;text-align:center}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff}
.modal-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.modal-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:16px}
.modal-close{width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;cursor:pointer}
.modal-close:hover{background:rgba(255,255,255,.1)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Smash or Pass</div>
  <div class="tagline">Cars Edition</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('game')" id="tab-game">🏁 Vote</button>
  <button class="tab" onclick="switchTab('garage')" id="tab-garage">🏎 Garage <span class="badge" id="garageBadge">0</span></button>
</div>

<!-- GAME VIEW -->
<div class="view active" id="view-game">
  <div class="scorebar">
    <div class="score-pill"><div class="score-dot pass"></div><span class="score-label">Pass</span><div class="score-num pass" id="passScore">0</div></div>
    <div class="score-pill"><div class="score-dot smash"></div><span class="score-label">Smash</span><div class="score-num smash" id="smashScore">0</div></div>
  </div>

  <div class="deck" id="deck">
    <div class="card ghost" id="cGhost"><div class="skel"></div></div>
    <div class="card back" id="cBack"><div class="skel"></div></div>
    <div class="card mid" id="cMid"><div class="skel"></div></div>
    <div class="card front" id="cFront">
      <div class="skel" id="sFront"></div>
      <img class="car-img" id="imgFront" alt="car"/>
      <div class="card-grad"></div>
      <div class="card-top-grad">
        <span class="car-num" id="cardNum">#1</span>
        <span class="origin-flag" id="cardFlag"></span>
      </div>
      <div class="card-info">
        <div class="car-category" id="cardCat">⚡ Hypercar</div>
        <div class="car-make" id="cardMake">Loading...</div>
        <div style="display:flex;align-items:baseline;gap:0">
          <div class="car-model" id="cardModel"></div>
          <div class="car-year" id="cardYear"></div>
        </div>
        <div class="car-stats" id="cardStats"></div>
        <div class="car-desc" id="cardDesc"></div>
      </div>
      <div class="vind smash" id="vindSmash">SMASH ✓</div>
      <div class="vind pass" id="vindPass">PASS ✗</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-pass" id="btnPass" onclick="vote('pass')" disabled>✕ Pass</button>
    <button class="btn-info" onclick="showDetail(currentCar)" title="Détails">ℹ</button>
    <button class="btn btn-smash" id="btnSmash" onclick="vote('smash')" disabled>♥ Smash</button>
  </div>
  <div class="hint">← Swipe gauche pour passer · Swipe droite pour smash →</div>
</div>

<!-- GARAGE VIEW -->
<div class="view" id="view-garage">
  <div class="garage-header">
    <div class="garage-title">🏎 Mon Garage</div>
    <div class="garage-count" id="garageCount">0 voiture(s) smashée(s)</div>
  </div>
  <div id="garageContent">
    <div class="garage-empty">
      <div class="icon">🏁</div>
      <p>Ton garage est vide.<br>Commence à voter pour remplir<br>ta collection de rêve !</p>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-backdrop hidden" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <img class="modal-img" id="modalImg" alt="car"/>
    <div class="modal-body">
      <div class="modal-make" id="modalMake"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.add('hidden')">Fermer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  {id:15,make:"Rimac",model:"Nevera",year:"2022",cat:"Électrique",flag:"🇭🇷",hp:"1914",top:"412",accel:"1.97",price:"2.2M€",desc:"1914 ch électriques. 0-100 en 1.97s. La voiture de production la plus rapide jamais construite.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Rimac_Nevera_Spa-Francorchamps_2022.jpg/1280px-Rimac_Nevera_Spa-Francorchamps_2022.jpg"},
  {id:16,make:"Ford",model:"GT",year:"2017",cat:"Supercar",flag:"🇺🇸",hp:"647",top:"347",accel:"3.1",price:"500k€",desc:"Rend hommage au légendaire GT40 vainqueur du Mans en 1966. Aéro inspirée F1.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/2017_Ford_GT_-_front_%28Reg%29.jpg/1280px-2017_Ford_GT_-_front_%28Reg%29.jpg"},
  {id:17,make:"Chevrolet",model:"Corvette Z06",year:"2023",cat:"Supercar",flag:"🇺🇸",hp:"670",top:"312",accel:"2.6",price:"110k€",desc:"Flat-plane V8 à moteur central. Agressivité américaine au prix d'une compacte européenne.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/2023_Chevrolet_Corvette_Z06_in_Rapid_Blue%2C_front_11.19.22.jpg/1280px-2023_Chevrolet_Corvette_Z06_in_Rapid_Blue%2C_front_11.19.22.jpg"},
  {id:18,make:"Porsche",model:"911 GT3 RS",year:"2022",cat:"Supercar",flag:"🇩🇪",hp:"525",top:"296",accel:"3.2",price:"230k€",desc:"Flat-6 atmosphérique, boîte PDK, aileron immense. La perfection selon Stuttgart.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Porsche_911_GT3_RS_%28992%29_-_front%2C_Autoshow_Brussels_2023.jpg/1280px-Porsche_911_GT3_RS_%28992%29_-_front%2C_Autoshow_Brussels_2023.jpg"},
  {id:19,make:"Mercedes-AMG",model:"ONE",year:"2023",cat:"Hypercar",flag:"🇩🇪",hp:"1063",top:"352",accel:"2.9",price:"2.7M€",desc:"Moteur F1 hybride homologué route. 4 moteurs électriques + V6 1.6L turbo.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Mercedes-AMG_ONE_-_IAA_2021_2_%28cropped%29.jpg/1280px-Mercedes-AMG_ONE_-_IAA_2021_2_%28cropped%29.jpg"},
  {id:20,make:"Maserati",model:"MC20",year:"2021",cat:"Supercar",flag:"🇮🇹",hp:"630",top:"325",accel:"2.9",price:"230k€",desc:"Retour aux sources pour Maserati. Moteur Nettuno V6 biturbo. Carbone et passion italienne.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Maserati_MC20_front.jpg/1280px-Maserati_MC20_front.jpg"},
  {id:21,make:"Aston Martin",model:"Valkyrie",year:"2021",cat:"Hypercar",flag:"🇬🇧",hp:"1160",top:"402",accel:"2.5",price:"3.2M€",desc:"Conçu par Adrian Newey. V12 Cosworth + KERS. Formule 1 légale sur route.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Aston_Martin_Valkyrie_Goodwood_2021.jpg/1280px-Aston_Martin_Valkyrie_Goodwood_2021.jpg"},
  {id:22,make:"Ferrari",model:"F40",year:"1992",cat:"Légendaire",flag:"🇮🇹",hp:"478",top:"324",accel:"3.9",price:"1.8M€",desc:"Dernière Ferrari signée par Enzo. Aucun luxe, aucune concession. Pure et absolue.",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Ferrari_F40_1987_red_lr.jpg/1280px-Ferrari_F40_1987_red_lr.jpg"},
];

let queue=[],smashed=[],passed=0,smashedCount=0,currentCar=null,nextCar=null,isAnimating=false;
let dragX=0,dragY=0,dragging=false,curX=0,curY=0;
let cardCounter=0;

const frontCard=document.getElementById('cFront');
const imgFront=document.getElementById('imgFront');
const sFront=document.getElementById('sFront');
const vindSmash=document.getElementById('vindSmash');
const vindPass=document.getElementById('vindPass');
const btnPass=document.getElementById('btnPass');
const btnSmash=document.getElementById('btnSmash');
const toast=document.getElementById('toast');

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function refill(){const c=[...CARS];shuffle(c);queue.push(...c)}

function renderCard(car){
  if(!car)return;
  cardCounter++;
  document.getElementById('cardNum').textContent='#'+cardCounter;
  document.getElementById('cardFlag').textContent=car.flag;
  document.getElementById('cardMake').textContent=car.make;
  document.getElementById('cardModel').textContent=car.model;
  document.getElementById('cardYear').textContent=car.year;
  document.getElementById('cardCat').innerHTML=(car.cat==='Légendaire'?'🏆':car.cat==='Hypercar'?'⚡':car.cat==='Électrique'?'🔋':'🔥')+' '+car.cat;
  document.getElementById('cardDesc').textContent=car.desc;
  document.getElementById('cardStats').innerHTML=`
    <div class="stat"><div class="stat-val">${car.hp}</div><div class="stat-label">Ch</div></div>
    <div class="stat"><div class="stat-val">${car.accel}s</div><div class="stat-label">0-100</div></div>
    <div class="stat"><div class="stat-val">${car.top}</div><div class="stat-label">Vmax</div></div>`;
  sFront.style.display='block';
  imgFront.classList.remove('visible');
  imgFront.src='';
  imgFront.onload=()=>{imgFront.classList.add('visible');sFront.style.display='none'};
  imgFront.onerror=()=>{sFront.style.display='none'};
  imgFront.src=car.img;
}

function init(){
  if(queue.length<5)refill();
  currentCar=queue.shift();
  renderCard(currentCar);
  if(queue.length<2)refill();
  nextCar=queue[0];
  const pi=new Image();pi.src=nextCar.img;
  btnPass.disabled=false;btnSmash.disabled=false;
}

function setButtons(d){btnPass.disabled=d;btnSmash.disabled=d}

let toastTimer;
function showToast(msg,color){
  clearTimeout(toastTimer);
  toast.textContent=msg;
  toast.style.borderColor=color||'#fff';
  toast.classList.add('show');
  toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);
}

function vote(type){
  if(isAnimating)return;
  isAnimating=true;setButtons(true);
  if(type==='smash'){
    smashedCount++;smashed.push(currentCar);
    document.getElementById('smashScore').textContent=smashedCount;
    document.getElementById('garageBadge').textContent=smashedCount;
    showToast('😍 Smash ! '+currentCar.model,'#2a9d5c');
    frontCard.classList.add('fly-right');
  } else {
    passed++;
    document.getElementById('passScore').textContent=passed;
    showToast('😬 Pass — '+currentCar.model,'#e63946');
    frontCard.classList.add('fly-left');
  }
  setTimeout(()=>{
    frontCard.classList.remove('fly-right','fly-left');
    frontCard.style.transform='';vindSmash.style.opacity='0';vindPass.style.opacity='0';
    if(queue.length<2)refill();
    currentCar=queue.shift();
    nextCar=queue[0];
    const pi=new Image();if(nextCar)pi.src=nextCar.img;
    renderCard(currentCar);
    frontCard.classList.add('card-enter');
    setTimeout(()=>frontCard.classList.remove('card-enter'),450);
    isAnimating=false;setButtons(false);
    updateGarage();
  },400);
}

frontCard.addEventListener('pointerdown',e=>{
  if(isAnimating)return;
  dragging=true;dragX=e.clientX;dragY=e.clientY;curX=0;curY=0;
  frontCard.setPointerCapture(e.pointerId);
  frontCard.style.transition='none';
});
frontCard.addEventListener('pointermove',e=>{
  if(!dragging)return;
  curX=e.clientX-dragX;curY=e.clientY-dragY;
  const rot=curX*0.09;
  frontCard.style.transform=`translateX(${curX}px) translateY(${curY*0.25}px) rotate(${rot}deg)`;
  const r=Math.min(Math.abs(curX)/90,1);
  if(curX>25){vindSmash.style.opacity=r;vindPass.style.opacity=0}
  else if(curX<-25){vindPass.style.opacity=r;vindSmash.style.opacity=0}
  else{vindSmash.style.opacity=0;vindPass.style.opacity=0}
});
frontCard.addEventListener('pointerup',()=>{
  if(!dragging)return;dragging=false;
  frontCard.style.transition='';
  if(curX>90)vote('smash');
  else if(curX<-90)vote('pass');
  else{frontCard.style.transform='';vindSmash.style.opacity='0';vindPass.style.opacity='0';}
});

function updateGarage(){
  const el=document.getElementById('garageContent');
  document.getElementById('garageCount').textContent=smashed.length+' voiture(s) smashée(s)';
  if(!smashed.length){
    el.innerHTML='<div class="garage-empty"><div class="icon">🏁</div><p>Ton garage est vide.<br>Commence à voter pour remplir<br>ta collection de rêve !</p></div>';
    return;
  }
  el.innerHTML='<div class="garage-grid">'+smashed.map(c=>`
    <div class="garage-card" onclick='showDetail(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
      <img src="${c.img}" alt="${c.model}" onerror="this.style.display='none'"/>
      <div class="garage-card-overlay">
        <div class="g-make">${c.make}</div>
        <div class="g-model">${c.model}</div>
        <div class="g-year">${c.year}</div>
      </div>
      <div class="smash-badge">♥ SMASH</div>
    </div>`).join('')+'</div>';
}

function showDetail(car){
  if(!car)return;
  const c=typeof car==='string'?JSON.parse(car):car;
  document.getElementById('modalImg').src=c.img;
  document.getElementById('modalMake').textContent=c.make+' '+c.year;
  document.getElementById('modalName').textContent=c.model;
  document.getElementById('modalDesc').textContent=c.desc;
  document.getElementById('modalStats').innerHTML=`
    <div class="modal-stat"><div class="modal-stat-val">${c.hp} ch</div><div class="modal-stat-label">Puissance</div></div>
    <div class="modal-stat"><div class="modal-stat-val">${c.accel}s</div><div class="modal-stat-label">0-100 km/h</div></div>
    <div class="modal-stat"><div class="modal-stat-val">${c.top} km/h</div><div class="modal-stat-label">Vmax</div></div>`;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(e){
  if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.add('hidden');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if(t==='garage')updateGarage();
}

init();
</script>
</body>
</html>
